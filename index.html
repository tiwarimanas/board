<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Blackboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">Smart Blackboard</h1>
            <div class="theme-switcher">
                <button id="theme-toggle" class="theme-btn" title="Switch Theme">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"/>
                    </svg>
                </button>
            </div>
        </header>

        <div class="toolbar">
            <div class="tool-group">
                <button id="pen-tool" class="tool-btn active" title="Pen (P)">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M13.586 3.586a2 2 0 112.828 2.828l-.793.793-2.828-2.828.793-.793zM11.379 5.793L3 14.172V17h2.828l8.38-8.379-2.83-2.828z"/>
                    </svg>
                </button>
                <button id="eraser-tool" class="tool-btn" title="Eraser (E)">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M8.707 2.293a1 1 0 00-1.414 0l-6 6a1 1 0 000 1.414l6 6a1 1 0 001.414 0l10-10a1 1 0 000-1.414l-6-6a1 1 0 00-1.414 0l-2.586 2.586z"/>
                    </svg>
                </button>
                <button id="line-tool" class="tool-btn" title="Line (L)">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="3" y1="17" x2="17" y2="3"/>
                    </svg>
                </button>
                <button id="rectangle-tool" class="tool-btn" title="Rectangle (R)">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="14" height="14"/>
                    </svg>
                </button>
                <button id="circle-tool" class="tool-btn" title="Circle (C)">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="10" cy="10" r="7"/>
                    </svg>
                </button>
            </div>

            <div class="tool-group">
                <label class="color-picker-container">
                    <span class="label-text">Color:</span>
                    <input type="color" id="color-picker" value="#ffffff">
                </label>
                <label class="thickness-container">
                    <span class="label-text">Size:</span>
                    <input type="range" id="thickness-slider" min="1" max="50" value="3">
                    <span id="thickness-value" class="value-display">3</span>
                </label>
            </div>

            <div class="tool-group">
                <button id="undo-btn" class="tool-btn" title="Undo (Ctrl+Z)">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M7 9l-4 4m0 0l4 4m-4-4h14a4 4 0 000-8H9"/>
                    </svg>
                </button>
                <button id="redo-btn" class="tool-btn" title="Redo (Ctrl+Y)">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M13 9l4 4m0 0l-4 4m4-4H3a4 4 0 010-8h8"/>
                    </svg>
                </button>
                <button id="clear-btn" class="tool-btn" title="Clear Canvas">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M4 4l12 12M16 4L4 16"/>
                    </svg>
                </button>
            </div>

            <div class="tool-group">
                <button id="save-btn" class="tool-btn" title="Save Drawing">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M17 9v8a2 2 0 01-2 2H5a2 2 0 01-2-2V9m14 0l-7-7-7 7m7-7v10"/>
                    </svg>
                </button>
                <button id="load-btn" class="tool-btn" title="Load Drawing">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 11l7 7 7-7m-7 7V3"/>
                    </svg>
                </button>
                <button id="download-btn" class="tool-btn" title="Download as Image">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 17v2a2 2 0 002 2h10a2 2 0 002-2v-2M10 3v12m0 0l4-4m-4 4l-4-4"/>
                    </svg>
                </button>
            </div>
        </div>

        <div class="canvas-container">
            <canvas id="blackboard" width="1200" height="700"></canvas>
        </div>

        <footer class="footer">
            <div class="shortcuts">
                <span><kbd>P</kbd> Pen</span>
                <span><kbd>E</kbd> Eraser</span>
                <span><kbd>L</kbd> Line</span>
                <span><kbd>R</kbd> Rectangle</span>
                <span><kbd>C</kbd> Circle</span>
                <span><kbd>Ctrl+Z</kbd> Undo</span>
                <span><kbd>Ctrl+Y</kbd> Redo</span>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
