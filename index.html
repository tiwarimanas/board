<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <title>Smart Blackboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-theme="sepia-dark">
    <noscript>
      <div class="no-js">This app requires JavaScript to run.</div>
    </noscript>

    <div class="app">
      <header class="toolbar" role="toolbar" aria-label="Blackboard toolbar">
        <div class="group" aria-label="Tools">
          <button id="tool-pen" class="tool-btn" data-tool="pen" title="Pen (P)" aria-pressed="true">Pen</button>
          <button id="tool-highlighter" class="tool-btn" data-tool="highlighter" title="Highlighter (H)">Highlighter</button>
          <button id="tool-eraser" class="tool-btn" data-tool="eraser" title="Eraser (E)">Eraser</button>
          <button id="tool-line" class="tool-btn" data-tool="line" title="Line (L)">Line</button>
          <button id="tool-rect" class="tool-btn" data-tool="rect" title="Rectangle (R)">Rect</button>
          <button id="tool-text" class="tool-btn" data-tool="text" title="Text (T)">Text</button>
        </div>

        <div class="group" aria-label="Stroke controls">
          <label class="control" title="Stroke color">
            <span>Color</span>
            <input id="color" type="color" value="#1f4b3f" />
          </label>
          <label class="control" title="Brush size">
            <span>Size</span>
            <input id="size" type="range" min="1" max="64" step="1" value="8" />
          </label>
        </div>

        <div class="group" aria-label="Board controls">
          <label class="switch" title="Toggle grid (G)">
            <input id="gridToggle" type="checkbox" checked />
            <span>Grid</span>
          </label>

          <label class="control" title="Theme">
            <span>Theme</span>
            <select id="theme">
              <option value="sepia-dark">Sepia dark</option>
              <option value="sepia-light">Sepia light</option>
            </select>
          </label>
        </div>

        <div class="group" aria-label="History">
          <button id="undo" class="tool-btn" title="Undo (Ctrl/Cmd+Z)">Undo</button>
          <button id="redo" class="tool-btn" title="Redo (Ctrl/Cmd+Shift+Z)">Redo</button>
          <button id="clear" class="tool-btn" title="Clear (Del)">Clear</button>
        </div>

        <div class="group" aria-label="Export">
          <button id="export" class="tool-btn" title="Download PNG">Export</button>
          <button id="copy" class="tool-btn" title="Copy image to clipboard">Copy</button>
        </div>
      </header>

      <main class="board" id="board" aria-label="Drawing board">
        <canvas id="bgCanvas" aria-hidden="true"></canvas>
        <canvas id="drawCanvas" aria-label="Drawing layer"></canvas>
        <canvas id="overlayCanvas" aria-hidden="true"></canvas>
        <textarea id="textInput" class="text-input hidden" spellcheck="false" placeholder="Type… (Enter to commit, Shift+Enter for newline)"></textarea>
      </main>
    </div>

    <script src="./app.js" type="module"></script>
  </body>
  </html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blackboard App (Fabric.js)</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <!-- Google Fonts: Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
    }
    #drawCanvas {
      border: 1px solid #444;
      display: block;
    }
    #canvasContainer {
      position: absolute;
      top: 0;
      bottom: 56px;
      left: 0;
      right: 0;
    }
  </style>
</head>
<body data-bs-theme="dark">
  <!-- Canvas Container -->
  <div id="canvasContainer">
    <canvas id="drawCanvas"></canvas>
  </div>

  <!-- Navigation Toolbar (fixed at bottom) -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-bottom shadow">
    <div class="container-fluid">
      <!-- Left side: Tools & Shape selectors -->
      <div class="d-flex align-items-center">
        <!-- Background Color Picker -->
        <div class="me-2">
          <input type="color" id="bgColor" class="form-control form-control-sm form-control-color" title="Board Background Color" value="#1c1c1c">
        </div>
        <!-- Pen Color Picker -->
        <div class="me-2">
          <input type="color" id="penColor" class="form-control form-control-sm  form-control-color" title="Pen Color" value="#ffffff">
        </div>
        <!-- Pen Width -->
        <div class="me-2" style="width:100px;">
          <input type="range" id="penWidth" class="form-range" min="1" max="20" value="2" title="Pen Width">
        </div>
        <!-- Tool Buttons -->
        <div class="btn-group me-2" role="group" aria-label="Drawing Tools">
          <button class="btn border btn-sm" id="penBtn" title="Free Draw"><i class="bi bi-pencil-fill"></i></button>
          <button class="btn border btn-sm" id="eraserBtn" title="Eraser"><i class="bi bi-eraser-fill"></i></button>
          <button class="btn border btn-sm" id="rectBtn" title="Rectangle"><i class="bi bi-square"></i></button>
          <button class="btn border btn-sm" id="triBtn" title="Triangle"><i class="bi bi-triangle-fill"></i></button>
          <button class="btn border btn-sm" id="circleBtn" title="Circle"><i class="bi bi-circle"></i></button>
          <button class="btn border btn-sm" id="lineBtn" title="Line">Line</button>
        </div>
        <!-- Clear Page (opens modal) -->
        <button class="btn btn-sm bg-danger-subtle me-2" id="clearPageBtn" title="Clear Current Page"><i class="bi bi-trash"></i></button>
        <!-- Fullscreen Toggle -->
        <button class="btn bg-light-subtle border btn-sm me-2" id="fullscreenBtn" title="Toggle Fullscreen"><i class="bi bi-arrows-fullscreen"></i></button>
      </div>

      <!-- Center: Page Navigation -->
      <div class="mx-auto d-flex align-items-center">
        <button class="btn btn-sm bg-primary-subtle me-2" id="prevPageBtn" title="Previous Page"><i class="bi bi-arrow-left"></i></button>
        <span class="navbar-text me-2" id="pageIndicator">Page 1</span>
        <button class="btn btn-sm bg-primary-subtle me-2" id="nextPageBtn" title="Next Page"><i class="bi bi-arrow-right"></i></button>
        <button class="btn btn-sm bg-light-subtle" id="addPageBtn" title="Add New Page"><i class="bi bi-plus"></i> Add</button>
      </div>

      <!-- Right side: Export/Import & Current Time -->
      <div class="d-flex align-items-center">
        <button class="btn bg-primary-subtle btn-sm me-2" id="exportPdfBtn">Export PDF</button>
        <button class="btn bg-primary-subtle btn-sm me-2" id="exportJsonBtn">Export JSON</button>
        <button class="btn bg-primary-subtle btn-sm me-2" id="importJsonBtn">Import JSON</button>
        <input type="file" id="importFileInput" accept=".json" style="display:none">
        <div id="currentTime" class="ms-2"></div>
      </div>
    </div>
  </nav>

  <!-- Bootstrap Modal for Clear Confirmation -->
  <div class="modal fade" id="clearModal" tabindex="-1" aria-labelledby="clearModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content bg-dark text-light">
        <div class="modal-header">
          <h5 class="modal-title" id="clearModalLabel">Confirm Clear</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          Are you sure you want to clear the current page?
        </div>
        <div class="modal-footer">
          <button type="button" class="btn border btn-sm" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-danger" id="confirmClearBtn">Yes, Clear</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Required Libraries -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <!-- jsPDF for PDF export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- FileSaver.js for JSON export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <!-- Fabric.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>

<script>
  // Global state
  let boardBackground = "#1c1c1c";
  let pages = []; // each page: { json: <fabric json>, bg: <color> }
  let currentPageIndex = 0;

  // Tools: "pen", "eraser", "rectangle", "triangle", "circle", "line"
  let currentTool = 'pen';
  let currentColor = "#ffffff";
  let currentLineWidth = 2;

  // Right-click erase state
  const RMB_ERASER_MIN = 22; // reasonable big eraser
  let rmbErasing = false;

  // Fabric canvas
  const fabricCanvas = new fabric.Canvas('drawCanvas', {
    backgroundColor: boardBackground,
    selection: true,
    preserveObjectStacking: true,
    fireRightClick: true,       // enable RMB events
    stopContextMenu: true       // prevent context menu
  });

  function resizeCanvas() {
    const container = document.getElementById('canvasContainer');
    fabricCanvas.setWidth(container.clientWidth);
    fabricCanvas.setHeight(container.clientHeight);
    fabricCanvas.requestRenderAll();
  }
  window.addEventListener('resize', resizeCanvas);

  // Build a circular SVG cursor data URL with center hotspot
  function makeCircleCursor(diameter, strokeColor = '#ffffff', strokeWidth = 2, fill = 'rgba(0,0,0,0)') {
    const r = Math.max(1, (diameter - strokeWidth) / 2);
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${diameter}" height="${diameter}" viewBox="0 0 ${diameter} ${diameter}">
      <circle cx="${diameter/2}" cy="${diameter/2}" r="${r}" fill="${fill}" stroke="${strokeColor}" stroke-width="${strokeWidth}"/>
    </svg>`;
    return 'data:image/svg+xml;base64,' + btoa(svg);
  }

  function applyDrawingCursor(width, outlineColor = '#ffffff') {
    const d = Math.max(8, Math.round(width)); // diameter
    const url = makeCircleCursor(d, outlineColor, 2, 'rgba(0,0,0,0)');
    // center hotspot uses d/2, fallback to pointer
    fabricCanvas.freeDrawingCursor = `url(${url}) ${Math.round(d/2)} ${Math.round(d/2)}, pointer`;
    // non-drawing hover cursor
    fabricCanvas.hoverCursor = 'pointer';
    fabricCanvas.requestRenderAll();
  }

  // Free drawing brush setup
  function ensureFreeDrawingBrush() {
    if (!fabricCanvas.freeDrawingBrush) {
      fabricCanvas.freeDrawingBrush = new fabric.PencilBrush(fabricCanvas);
    }
    const isErase = (currentTool === 'eraser');
    fabricCanvas.freeDrawingBrush.color = isErase
      ? (fabricCanvas.backgroundColor || boardBackground)
      : currentColor;
    fabricCanvas.freeDrawingBrush.width = currentLineWidth;
    applyDrawingCursor(fabricCanvas.freeDrawingBrush.width);
  }

  // Tool switching
  function setTool(tool) {
    currentTool = tool;
    const drawingTool = (tool === 'pen' || tool === 'eraser');
    fabricCanvas.isDrawingMode = drawingTool;
    if (drawingTool) ensureFreeDrawingBrush();
    $('.btn-group button').removeClass('btn-primary').addClass('border');
    const map = { pen:'#penBtn', eraser:'#eraserBtn', rectangle:'#rectBtn', triangle:'#triBtn', circle:'#circleBtn', line:'#lineBtn' };
    $(map[tool]).removeClass('border').addClass('btn-primary');
    if (!drawingTool) {
      // shape tools use pointer hover; circular cursor only when drawing
      fabricCanvas.hoverCursor = 'pointer';
    } else {
      applyDrawingCursor(fabricCanvas.freeDrawingBrush?.width || currentLineWidth);
    }
  }

  // Page helpers
  function updatePageIndicator() { $('#pageIndicator').text('Page ' + (currentPageIndex + 1)); }
  function snapshotCurrentPage() {
    if (!pages[currentPageIndex]) return;
    pages[currentPageIndex].json = fabricCanvas.toJSON();
    pages[currentPageIndex].bg = fabricCanvas.backgroundColor || boardBackground;
  }
  function renderPage(index) {
    const page = pages[index];
    fabricCanvas.backgroundColor = page?.bg || boardBackground;
    if (page && page.json) {
      fabricCanvas.loadFromJSON(page.json, () => fabricCanvas.renderAll());
    } else {
      fabricCanvas.clear();
      fabricCanvas.setBackgroundColor(page?.bg || boardBackground, fabricCanvas.renderAll.bind(fabricCanvas));
    }
  }
  function addNewBlankPage() {
    pages.push({ json: { objects: [], background: boardBackground }, bg: boardBackground });
    currentPageIndex = pages.length - 1;
    renderPage(currentPageIndex);
    updatePageIndicator();
  }
  function registerChangeTracking() {
    const snapshot = () => snapshotCurrentPage();
    fabricCanvas.on('object:added', snapshot);
    fabricCanvas.on('object:modified', snapshot);
    fabricCanvas.on('object:removed', snapshot);
    fabricCanvas.on('path:created', snapshot);
  }

  // Shape drawing state
  let drawingShape = false;
  let shapeObj = null;
  let startX = 0, startY = 0;

  function startShape(pointer) {
    drawingShape = true;
    startX = pointer.x;
    startY = pointer.y;

    const common = {
      left: startX, top: startY,
      stroke: currentColor, strokeWidth: currentLineWidth,
      fill: 'rgba(0,0,0,0)', selectable: true, objectCaching: false
    };

    if (currentTool === 'rectangle') shapeObj = new fabric.Rect({ ...common, width: 1, height: 1, originX: 'left', originY: 'top' });
    else if (currentTool === 'circle') shapeObj = new fabric.Circle({ ...common, radius: 1, originX: 'center', originY: 'center' });
    else if (currentTool === 'triangle') shapeObj = new fabric.Triangle({ ...common, width: 1, height: 1, originX: 'left', originY: 'top' });
    else if (currentTool === 'line') shapeObj = new fabric.Line([startX, startY, startX, startY], { stroke: currentColor, strokeWidth: currentLineWidth, selectable: true, evented: true });

    if (shapeObj) fabricCanvas.add(shapeObj);
  }

  function updateShape(pointer) {
    if (!drawingShape || !shapeObj) return;
    const x = pointer.x, y = pointer.y;

    if (shapeObj.type === 'rect' || shapeObj.type === 'triangle') {
      const left = Math.min(startX, x), top = Math.min(startY, y);
      const width = Math.abs(x - startX), height = Math.abs(y - startY);
      shapeObj.set({ left, top, width, height });
    } else if (shapeObj.type === 'circle') {
      const dx = x - startX, dy = y - startY;
      const r = Math.sqrt(dx*dx + dy*dy);
      shapeObj.set({ left: startX, top: startY, radius: r });
    } else if (shapeObj.type === 'line') {
      shapeObj.set({ x2: x, y2: y });
    }

    shapeObj.setCoords();
    fabricCanvas.requestRenderAll();
  }

  function endShape() {
    drawingShape = false;
    shapeObj = null;
    snapshotCurrentPage();
  }

  // Mouse handlers for shapes
  fabricCanvas.on('mouse:down', function (opt) {
    // Right-click erase: temporarily switch to drawing brush that uses background color and big width
    if (opt.e && opt.e.button === 2) {
      rmbErasing = true;
      const bg = fabricCanvas.backgroundColor || boardBackground;
      const w = Math.max(RMB_ERASER_MIN, currentLineWidth * 3);
      const wasDrawing = fabricCanvas.isDrawingMode;
      fabricCanvas.__prevWasDrawing = wasDrawing;
      fabricCanvas.isDrawingMode = true;
      ensureFreeDrawingBrush();
      fabricCanvas.freeDrawingBrush.color = bg;
      fabricCanvas.freeDrawingBrush.width = w;
      applyDrawingCursor(w); // show big eraser circle
      return; // RMB path creation handled by Fabric in drawing mode
    }

    if (fabricCanvas.isDrawingMode) return; // pen/eraser handled by Fabric
    const pointer = fabricCanvas.getPointer(opt.e);
    startShape(pointer);
  });

  fabricCanvas.on('mouse:move', function (opt) {
    if (fabricCanvas.isDrawingMode) return;
    if (!drawingShape) return;
    const pointer = fabricCanvas.getPointer(opt.e);
    updateShape(pointer);
  });

  fabricCanvas.on('mouse:up', function () {
    if (rmbErasing) {
      rmbErasing = false;
      // restore tool mode and cursor
      fabricCanvas.isDrawingMode = (currentTool === 'pen' || currentTool === 'eraser');
      ensureFreeDrawingBrush();
      applyDrawingCursor(fabricCanvas.freeDrawingBrush?.width || currentLineWidth);
      snapshotCurrentPage();
      return;
    }
    if (fabricCanvas.isDrawingMode) return;
    if (!drawingShape) return;
    endShape();
  });

  // Toolbar and modal event handlers
  $(document).ready(function(){
    // Init canvas
    resizeCanvas();
    // Start with one blank page
    pages = [];
    addNewBlankPage();
    registerChangeTracking();
    setTool('pen');

    // Tool selection
    $('#penBtn').on('click', () => setTool('pen'));
    $('#eraserBtn').on('click', () => setTool('eraser'));
    $('#rectBtn').on('click', () => setTool('rectangle'));
    $('#triBtn').on('click', () => setTool('triangle'));
    $('#circleBtn').on('click', () => setTool('circle'));
    $('#lineBtn').on('click', () => setTool('line'));

    // Background color change
    $('#bgColor').on('change', function(){
      boardBackground = $(this).val();
      fabricCanvas.setBackgroundColor(boardBackground, fabricCanvas.renderAll.bind(fabricCanvas));
      ensureFreeDrawingBrush();
      snapshotCurrentPage();
    });

    // Pen color and width controls
    $('#penColor').on('change', function(){
      currentColor = $(this).val();
      ensureFreeDrawingBrush();
    });
    $('#penWidth').on('change', function(){
      currentLineWidth = parseInt($(this).val());
      ensureFreeDrawingBrush();
    });

    // Clear Page modal
    $('#clearPageBtn').on('click', function(){
      const clearModal = new bootstrap.Modal(document.getElementById('clearModal'));
      clearModal.show();
    });
    $('#confirmClearBtn').on('click', function(){
      const bg = fabricCanvas.backgroundColor || boardBackground;
      fabricCanvas.getObjects().forEach(obj => fabricCanvas.remove(obj));
      fabricCanvas.setBackgroundColor(bg, fabricCanvas.renderAll.bind(fabricCanvas));
      snapshotCurrentPage();
      bootstrap.Modal.getInstance(document.getElementById('clearModal')).hide();
    });

    // Fullscreen toggle
    $('#fullscreenBtn').on('click', function(){
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => { alert(`Error attempting to enable full-screen mode: ${err.message}`); });
      } else {
        document.exitFullscreen();
      }
    });

    // Page navigation
    $('#addPageBtn').on('click', function(){ snapshotCurrentPage(); addNewBlankPage(); });
    $('#prevPageBtn').on('click', function(){
      if (currentPageIndex > 0) {
        snapshotCurrentPage();
        currentPageIndex--;
        renderPage(currentPageIndex);
        updatePageIndicator();
      }
    });
    $('#nextPageBtn').on('click', function(){
      if (currentPageIndex < pages.length - 1) {
        snapshotCurrentPage();
        currentPageIndex++;
        renderPage(currentPageIndex);
        updatePageIndicator();
      }
    });

    // Export PDF
    $('#exportPdfBtn').on('click', async function(){
      snapshotCurrentPage();
      const { jsPDF } = window.jspdf;
      const w = fabricCanvas.getWidth(), h = fabricCanvas.getHeight();
      const pdf = new jsPDF('landscape', 'pt', [w, h]);

      // Save current state
      const savedIndex = currentPageIndex;
      const savedJSON = fabricCanvas.toJSON();
      const savedBG = fabricCanvas.backgroundColor;

      for (let i = 0; i < pages.length; i++) {
        const page = pages[i];
        await new Promise((resolve) => {
          fabricCanvas.setBackgroundColor(page.bg || boardBackground, () => {
            fabricCanvas.loadFromJSON(page.json || { objects: [] }, () => {
              fabricCanvas.renderAll(); resolve();
            });
          });
        });
        const dataUrl = fabricCanvas.toDataURL({ format: 'jpeg', quality: 1.0 });
        if (i > 0) pdf.addPage();
        pdf.addImage(dataUrl, 'JPEG', 0, 0, w, h);
      }

      // Restore
      await new Promise((resolve) => {
        fabricCanvas.setBackgroundColor(savedBG || boardBackground, () => {
          fabricCanvas.loadFromJSON(savedJSON, () => {
            fabricCanvas.renderAll(); currentPageIndex = savedIndex; updatePageIndicator(); resolve();
          });
        });
      });

      pdf.save('blackboard.pdf');
    });

    // Export JSON
    $('#exportJsonBtn').on('click', function(){
      snapshotCurrentPage();
      const dataStr = JSON.stringify(pages);
      const blob = new Blob([dataStr], { type: "application/json" });
      saveAs(blob, "blackboard.json");
    });

    // Import JSON
    $('#importJsonBtn').on('click', function(){ $('#importFileInput').click(); });
    $('#importFileInput').on('change', function(e){
      if(e.target.files && e.target.files[0]){
        const reader = new FileReader();
        reader.onload = function(ev){
          try {
            const importedPages = JSON.parse(ev.target.result);
            if(Array.isArray(importedPages)){
              pages = importedPages;
              currentPageIndex = 0;
              renderPage(currentPageIndex);
              updatePageIndicator();
            } else alert("Invalid file format");
          } catch(err){ alert("Error reading file: " + err); }
        };
        reader.readAsText(e.target.files[0]);
      }
    });

    // Current time
    function updateTime(){ $('#currentTime').text(new Date().toLocaleTimeString()); }
    setInterval(updateTime, 1000); updateTime();
  });
</script>

</body>
</html>
