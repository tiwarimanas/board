<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Blackboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- Header Toolbar -->
        <header class="toolbar">
            <div class="toolbar-left">
                <h1 class="app-title">📝 Smart Blackboard</h1>
            </div>
            
            <div class="toolbar-center">
                <!-- Drawing Tools -->
                <div class="tool-group">
                    <button class="tool-btn active" data-tool="pen" title="Pen (P)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 19l7-7 3 3-7 7-3-3z"></path>
                            <path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path>
                            <path d="M2 2l7.586 7.586"></path>
                        </svg>
                    </button>
                    <button class="tool-btn" data-tool="eraser" title="Eraser (E)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 20H7L3 16l7.5-7.5L16 14l4 4-4 2z"></path>
                            <path d="M16 8L8 16"></path>
                        </svg>
                    </button>
                    <button class="tool-btn" data-tool="line" title="Line (L)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="5" y1="19" x2="19" y2="5"></line>
                        </svg>
                    </button>
                    <button class="tool-btn" data-tool="rectangle" title="Rectangle (R)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18"></rect>
                        </svg>
                    </button>
                    <button class="tool-btn" data-tool="circle" title="Circle (C)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="9"></circle>
                        </svg>
                    </button>
                    <button class="tool-btn" data-tool="text" title="Text (T)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="4 7 4 4 20 4 20 7"></polyline>
                            <line x1="9" y1="20" x2="15" y2="20"></line>
                            <line x1="12" y1="4" x2="12" y2="20"></line>
                        </svg>
                    </button>
                </div>
                
                <div class="separator"></div>
                
                <!-- Color Picker -->
                <div class="tool-group">
                    <label class="color-picker-wrapper" title="Color">
                        <input type="color" id="colorPicker" value="#ffffff">
                        <div class="color-preview"></div>
                    </label>
                </div>
                
                <!-- Brush Size -->
                <div class="tool-group">
                    <label class="slider-wrapper" title="Brush Size">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                            <circle cx="12" cy="12" r="8"></circle>
                        </svg>
                        <input type="range" id="brushSize" min="1" max="50" value="3">
                        <span id="brushSizeValue">3</span>
                    </label>
                </div>
                
                <div class="separator"></div>
                
                <!-- Actions -->
                <div class="tool-group">
                    <button class="tool-btn" id="undoBtn" title="Undo (Ctrl+Z)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 7v6h6"></path>
                            <path d="M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"></path>
                        </svg>
                    </button>
                    <button class="tool-btn" id="redoBtn" title="Redo (Ctrl+Y)">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 7v6h-6"></path>
                            <path d="M3 17a9 9 0 019-9 9 9 0 016 2.3l3 2.7"></path>
                        </svg>
                    </button>
                    <button class="tool-btn" id="clearBtn" title="Clear All">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"></path>
                        </svg>
                    </button>
                </div>
                
                <div class="separator"></div>
                
                <!-- File Operations -->
                <div class="tool-group">
                    <button class="tool-btn" id="saveBtn" title="Save Image">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"></path>
                            <polyline points="17 21 17 13 7 13 7 21"></polyline>
                            <polyline points="7 3 7 8 15 8"></polyline>
                        </svg>
                    </button>
                    <button class="tool-btn" id="loadBtn" title="Load Image">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                    </button>
                    <input type="file" id="fileInput" accept="image/*" style="display: none;">
                </div>
            </div>
            
            <div class="toolbar-right">
                <!-- Theme Selector -->
                <div class="theme-selector">
                    <button class="theme-btn active" data-theme="dark" title="Dark Sepia">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path>
                        </svg>
                    </button>
                    <button class="theme-btn" data-theme="light" title="Light Sepia">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="5"></circle>
                            <line x1="12" y1="1" x2="12" y2="3"></line>
                            <line x1="12" y1="21" x2="12" y2="23"></line>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                            <line x1="1" y1="12" x2="3" y2="12"></line>
                            <line x1="21" y1="12" x2="23" y2="12"></line>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                        </svg>
                    </button>
                </div>
            </div>
        </header>
        
        <!-- Canvas Container -->
        <div class="canvas-container">
            <canvas id="blackboard"></canvas>
        </div>
        
        <!-- Status Bar -->
        <footer class="status-bar">
            <div class="status-left">
                <span id="toolStatus">Tool: Pen</span>
            </div>
            <div class="status-center">
                <span id="positionStatus">Position: -</span>
            </div>
            <div class="status-right">
                <span id="themeStatus">Theme: Dark Sepia</span>
            </div>
        </footer>
    </div>
    
    <!-- Text Input Modal -->
    <div id="textModal" class="modal">
        <div class="modal-content">
            <h3>Add Text</h3>
            <input type="text" id="textInput" placeholder="Enter your text..." autocomplete="off">
            <div class="modal-actions">
                <button id="textOkBtn" class="btn btn-primary">OK</button>
                <button id="textCancelBtn" class="btn btn-secondary">Cancel</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
